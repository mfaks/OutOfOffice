name: Hermes CI

on:
  # Event triggered when code is pushed to any branch
  push:
    branches:
      - '**'

  # Event triggered when a PR targeting main is opened, updated with new commits, or closed
  pull_request:
    branches:
      - main
    types: [opened, synchronize, closed]

# Add concurrency to prevent duplicate CI runs on the same branch or PR
concurrency:
  group: hermes-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job that runs build and test steps for pushes and active PR updates; skips the PR closed event so build/test does not rerun when the PR is merged
  build-and-test:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check backend formatting
        working-directory: backend
        run: python -m black --check .

      - name: Lint backend
        working-directory: backend
        run: python -m ruff check .

      - name: Validate backend syntax
        working-directory: backend
        run: python -m compileall .

      - name: Test backend
        working-directory: backend
        env:
          SERPAPI_API_KEY: test-key
        run: python -m pytest

  # Job that only runs when a PR was merged into main
  if_merged:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "The PR was merged into main"