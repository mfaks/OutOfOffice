repos:
  - repo: local
    hooks:
      - id: frontend-format
        name: frontend format
        entry: bash -c 'cd frontend && npx prettier . --write'
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false

      - id: backend-black
        name: backend black
        entry: bash -c 'cd backend && python -m black .'
        language: system
        pass_filenames: false

      - id: backend-ruff
        name: backend ruff fix
        entry: bash -c 'cd backend && python -m ruff check . --fix'
        language: system
        pass_filenames: false